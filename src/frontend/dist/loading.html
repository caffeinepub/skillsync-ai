<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillSync AI – Analyzing</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #020818; font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(135deg, #020818, #0a0f2e, #0d1b4b, #0f0a2e, #020818);
      background-size: 400% 400%; animation: gradientShift 8s ease infinite;
    }
    @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .particle { position: absolute; border-radius: 50%; opacity: 0; animation: floatParticle linear infinite; }
    @keyframes floatParticle { 0% { transform: translateY(100vh) scale(0); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) scale(1); opacity: 0; } }
    .center {
      position: relative; z-index: 10;
      text-align: center;
      animation: fadeIn 0.8s ease forwards;
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

    /* Ring spinner */
    .spinner {
      width: 90px; height: 90px;
      border-radius: 50%;
      border: 3px solid rgba(0,200,255,0.1);
      border-top-color: #00c8ff;
      border-right-color: #7b2fff;
      animation: spin 1s linear infinite;
      margin: 0 auto 2rem;
      box-shadow: 0 0 30px rgba(0,200,255,0.3);
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Inner pulse dot */
    .inner-dot {
      width: 20px; height: 20px; border-radius: 50%;
      background: radial-gradient(circle, #00ffe1, #00c8ff);
      margin: 0 auto;
      animation: pulse 1s ease-in-out infinite;
      box-shadow: 0 0 20px #00c8ff;
      position: relative; top: 35px;
    }
    @keyframes pulse { 0%,100% { transform: scale(1); opacity:1; } 50% { transform: scale(1.5); opacity:0.5; } }

    .title {
      font-size: 1.5rem; font-weight: 700;
      background: linear-gradient(90deg, #00c8ff, #c084fc);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 0.8rem;
    }
    .sub { color: #7a9cc8; font-size: 0.95rem; }

    /* Pulsing dots */
    .dots { margin-top: 1.5rem; display: flex; gap: 0.5rem; justify-content: center; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #00c8ff;
      box-shadow: 0 0 10px #00c8ff;
      animation: dotPulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; background: #7b2fff; box-shadow: 0 0 10px #7b2fff; }
    .dot:nth-child(3) { animation-delay: 0.4s; background: #00ffe1; box-shadow: 0 0 10px #00ffe1; }
    @keyframes dotPulse { 0%,80%,100% { transform: scale(0.6); opacity:0.4; } 40% { transform: scale(1.2); opacity:1; } }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="particles" id="particles"></div>
  <div class="center">
    <div class="spinner"><div class="inner-dot"></div></div>
    <div class="title">Analyzing your skills...</div>
    <div class="sub">Generating your personalized results...</div>
    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  </div>
  <script>
    const container = document.getElementById('particles');
    const colors = ['#00c8ff','#7b2fff','#00ffe1','#4f8bff','#c084fc'];
    for (let i = 0; i < 30; i++) {
      const p = document.createElement('div'); p.className = 'particle';
      const size = Math.random()*4+1;
      p.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;background:${colors[i%colors.length]};box-shadow:0 0 ${size*3}px ${colors[i%colors.length]};animation-duration:${Math.random()*8+6}s;animation-delay:${Math.random()*8}s;`;
      container.appendChild(p);
    }
    setTimeout(() => { window.location.href = 'result.html'; }, 800);
  </script>
</body>
</html>
