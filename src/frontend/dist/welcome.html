<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillSync AI – Welcome</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: #020818; overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(135deg, #020818, #0a0f2e, #0d1b4b, #0f0a2e, #020818);
      background-size: 400% 400%;
      animation: gradientShift 8s ease infinite;
    }
    @keyframes gradientShift {
      0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
    }
    .particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
    .particle {
      position: absolute; border-radius: 50%; opacity: 0;
      animation: floatParticle linear infinite;
    }
    @keyframes floatParticle {
      0%   { transform: translateY(100vh) scale(0); opacity: 0; }
      10%  { opacity: 1; } 90% { opacity: 1; }
      100% { transform: translateY(-10vh) scale(1); opacity: 0; }
    }
    .center {
      position: relative; z-index: 10;
      text-align: center; padding: 2rem;
      animation: fadeIn 1s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .headline {
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      font-weight: 900;
      background: linear-gradient(90deg, #00c8ff, #c084fc, #00ffe1);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      animation: shimmer 3s linear infinite;
      filter: drop-shadow(0 0 18px rgba(0,200,255,0.5));
      line-height: 1.2;
      max-width: 800px;
    }
    @keyframes shimmer { to { background-position: 200% center; } }
    .sub {
      margin-top: 1.5rem;
      font-size: clamp(0.95rem, 2.5vw, 1.2rem);
      color: #94b8e8;
      text-shadow: 0 0 12px #00c8ff66;
      line-height: 1.8;
    }
    .btn {
      display: inline-block; margin-top: 2.5rem;
      padding: 1rem 3rem;
      font-size: 1.1rem; font-weight: 700; letter-spacing: 0.15em;
      color: #fff;
      background: transparent;
      border: 2px solid #00c8ff;
      border-radius: 50px;
      cursor: pointer;
      text-transform: uppercase;
      box-shadow: 0 0 20px #00c8ff66, inset 0 0 20px rgba(0,200,255,0.05);
      transition: all 0.3s ease;
      position: relative; overflow: hidden;
    }
    .btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, transparent, rgba(0,200,255,0.15), transparent);
      transform: translateX(-100%);
      transition: transform 0.4s ease;
    }
    .btn:hover {
      box-shadow: 0 0 40px #00c8ffaa, 0 0 80px #00c8ff44, inset 0 0 20px rgba(0,200,255,0.1);
      border-color: #00ffe1;
      color: #00ffe1;
      transform: translateY(-2px);
    }
    .btn:hover::before { transform: translateX(100%); }
    .icon { font-size: 3rem; display: block; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="particles" id="particles"></div>
  <div class="center">
    <span class="icon">🤖</span>
    <div class="headline">Empower Your Skills.<br/>Evolve with AI.</div>
    <div class="sub">
      Study smarter, not harder — with AI.<br/>
      Your smart study partner for better results.
    </div>
    <button class="btn" onclick="window.location.href='main.html'">GET STARTED</button>
  </div>
  <script>
    const container = document.getElementById('particles');
    const colors = ['#00c8ff','#7b2fff','#00ffe1','#4f8bff','#c084fc'];
    for (let i = 0; i < 60; i++) {
      const p = document.createElement('div'); p.className = 'particle';
      const size = Math.random()*4+1;
      p.style.cssText = `left:${Math.random()*100}%;width:${size}px;height:${size}px;background:${colors[i%colors.length]};box-shadow:0 0 ${size*3}px ${colors[i%colors.length]};animation-duration:${Math.random()*8+6}s;animation-delay:${Math.random()*8}s;`;
      container.appendChild(p);
    }
  </script>
</body>
</html>
